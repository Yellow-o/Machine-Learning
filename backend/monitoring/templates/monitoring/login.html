<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 驾驶监测系统</title>
  <style>
    :root {
      --bg: #eef3f9;
      --bg-accent: #d8efe8;
      --ink: #0f172a;
      --muted: #5b6474;
      --line: #dbe3ef;
      --card: #ffffff;
      --brand: #0f766e;
      --brand-dark: #0b5f59;
      --danger-soft: #ffe6e2;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 5%, var(--bg-accent), transparent 34%),
        radial-gradient(circle at 95% 0%, #ffe8d4, transparent 28%),
        var(--bg);
      padding: 20px;
    }
    .card {
      width: min(94vw, 460px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(15,23,42,.08);
    }
    .logo {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      background: #d9f3ef;
      padding: 5px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    h1 { margin: 0; font-size: 28px; }
    p { margin: 8px 0 18px; color: var(--muted); }
    label { display: block; margin: 12px 0 6px; font-weight: 700; }
    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #cfd8e6;
      font-size: 15px;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #8cb3da;
      box-shadow: 0 0 0 3px rgba(15,118,110,.12);
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #14b8a6);
      cursor: pointer;
    }
    button:hover { background: linear-gradient(135deg, var(--brand-dark), #0d9488); }
    .err {
      margin-top: 12px;
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid #fecaca;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .ok {
      margin-top: 12px;
      color: #0f766e;
      background: #dff7f2;
      border: 1px solid #a7f3d0;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .foot {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
    .foot a { color: #0f4c81; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <form class="card" method="post">
    {% csrf_token %}
    <div class="logo">Fatigue Monitoring Console</div>
    <h1>系统登录</h1>
    <p>支持 UID 或手机号登录，密码不变。</p>
    {% if request.GET.uid %}
      <div class="ok">注册成功，你的 UID 账号是：{{ request.GET.uid }}</div>
    {% endif %}

    <label for="id_username">账号（UID / 手机号）</label>
    <input id="id_username" name="username" type="text" value="{{ request.GET.uid|default:'' }}" placeholder="请输入 UID 或手机号" required autofocus>

    <label for="id_password">密码</label>
    <input id="id_password" name="password" type="password" required>

    <button type="submit">进入系统</button>

    {% if form.errors %}
      <div class="err">账号或密码错误，请重试。</div>
    {% endif %}

    <div class="foot">还没有账号？<a href="/signup/">去注册</a></div>
  </form>
</body>
</html>
